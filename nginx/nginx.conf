worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---------------------------------------------------------------------------
    # Performance
    # ---------------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ---------------------------------------------------------------------------
    # Gzip
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/css
        application/javascript
        application/json;

    # ---------------------------------------------------------------------------
    # File uploads (exam images/videos)
    # ---------------------------------------------------------------------------
    client_max_body_size 100M;

    # ---------------------------------------------------------------------------
    # Rate limiting
    # ---------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ---------------------------------------------------------------------------
    # Resolver for Docker DNS
    # ---------------------------------------------------------------------------
    resolver 127.0.0.11 valid=10s;

    # ---------------------------------------------------------------------------
    # SSL shared settings
    # ---------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/vetra.vet.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vetra.vet.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # =========================================================================
    # HTTP → HTTPS redirect (all domains)
    # =========================================================================
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # vetra.vet.br — Landing page + Grafana
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name vetra.vet.br;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"                       always;
        add_header X-Content-Type-Options "nosniff"                          always;
        add_header X-XSS-Protection       "1; mode=block"                   always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;

        location / {
            set $landing_upstream http://landing:80;
            proxy_pass $landing_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }

        location /grafana/ {
            set $grafana_upstream http://grafana:3000;
            proxy_pass $grafana_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # =========================================================================
    # app.vetra.vet.br — Portal (SPA) + API proxy
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name app.vetra.vet.br;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"                       always;
        add_header X-Content-Type-Options "nosniff"                          always;
        add_header X-XSS-Protection       "1; mode=block"                   always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;

        location / {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }

        location /api/ {
            limit_req zone=api burst=50 nodelay;

            set $backend_upstream http://backend:8080;
            proxy_pass $backend_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }

        location /q/ {
            set $backend_upstream http://backend:8080;
            proxy_pass $backend_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }
    }

    # =========================================================================
    # api.vetra.vet.br — Backend API (direct)
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name api.vetra.vet.br;

        # Security headers
        add_header X-Content-Type-Options "nosniff"                          always;
        add_header X-XSS-Protection       "1; mode=block"                   always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;

        location / {
            limit_req zone=api burst=50 nodelay;

            set $backend_upstream http://backend:8080;
            proxy_pass $backend_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }
    }

    # =========================================================================
    # auth.vetra.vet.br — Keycloak
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        server_name auth.vetra.vet.br;

        # No X-Frame-Options here — Keycloak manages its own CORS and frame headers
        add_header X-Content-Type-Options "nosniff" always;

        location / {
            set $keycloak_upstream http://keycloak:8080;
            proxy_pass $keycloak_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            proxy_buffer_size   128k;
            proxy_buffers       4 256k;
        }
    }
}

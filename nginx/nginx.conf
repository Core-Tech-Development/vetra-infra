worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---------------------------------------------------------------------------
    # Performance
    # ---------------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ---------------------------------------------------------------------------
    # Gzip
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json;

    # ---------------------------------------------------------------------------
    # File uploads (exam images/videos)
    # ---------------------------------------------------------------------------
    client_max_body_size 100M;

    # ---------------------------------------------------------------------------
    # Rate limiting
    # ---------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ---------------------------------------------------------------------------
    # Security headers (applied to all responses)
    # ---------------------------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;

    # ---------------------------------------------------------------------------
    # Upstreams
    # ---------------------------------------------------------------------------
    upstream backend {
        server backend:8080;
    }

    upstream frontend {
        server frontend:80;
    }

    upstream landing {
        server landing:80;
    }

    upstream keycloak {
        server keycloak:8080;
    }

    upstream grafana {
        server grafana:3000;
    }

    # =========================================================================
    # HTTP → HTTPS redirect (all domains)
    # =========================================================================
    server {
        listen 80;
        server_name vetra.vet.br app.vetra.vet.br api.vetra.vet.br auth.vetra.vet.br;

        # Let's Encrypt / ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # vetra.vet.br — Landing page + Grafana
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name vetra.vet.br;

        ssl_certificate     /etc/letsencrypt/live/vetra.vet.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vetra.vet.br/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Landing page
        location / {
            proxy_pass http://landing/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }

        # Grafana
        location /grafana/ {
            proxy_pass http://grafana;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # WebSocket support (live dashboards)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # =========================================================================
    # app.vetra.vet.br — Portal (SPA) + API
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name app.vetra.vet.br;

        ssl_certificate     /etc/letsencrypt/live/vetra.vet.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vetra.vet.br/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Frontend SPA
        location / {
            proxy_pass http://frontend/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }

        # Backend API
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://backend/api/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }

        # Quarkus health / metrics
        location /q/ {
            proxy_pass http://backend/q/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }
    }

    # =========================================================================
    # api.vetra.vet.br — Backend API (direct)
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name api.vetra.vet.br;

        ssl_certificate     /etc/letsencrypt/live/vetra.vet.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vetra.vet.br/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://backend/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
        }
    }

    # =========================================================================
    # auth.vetra.vet.br — Keycloak
    # =========================================================================
    server {
        listen 443 ssl http2;
        server_name auth.vetra.vet.br;

        ssl_certificate     /etc/letsencrypt/live/vetra.vet.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vetra.vet.br/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://keycloak/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # Keycloak returns large headers (tokens, cookies)
            proxy_buffer_size   128k;
            proxy_buffers       4 256k;
        }
    }
}
